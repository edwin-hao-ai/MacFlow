<!-- 菜单栏专用图标：纯黑 sparkle，macOS 会自动适配深浅色（模板图标） -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44" fill="none">
  <!-- 主 sparkle，缩放到 44×44 菜单栏尺寸 -->
  <!-- 中心坐标 (22, 22)，外径 ~16px -->
  <path d="M 22 4
           C 22.5 4, 23 4.5, 23 5
           L 24.8 13
           C 25.3 15.5, 27.5 17.5, 30 18
           L 38 19.8
           C 38.5 19.9, 39 20.4, 39 21
           C 39 21.6, 38.5 22.1, 38 22.2
           L 30 24
           C 27.5 24.5, 25.3 26.5, 24.8 29
           L 23 37
           C 23 37.5, 22.5 38, 22 38
           C 21.5 38, 21 37.5, 21 37
           L 19.2 29
           C 18.7 26.5, 16.5 24.5, 14 24
           L 6 22.2
           C 5.5 22.1, 5 21.6, 5 21
           C 5 20.4, 5.5 19.9, 6 19.8
           L 14 18
           C 16.5 17.5, 18.7 15.5, 19.2 13
           L 21 5
           C 21 4.5, 21.5 4, 22 4 Z"
        fill="#000000"/>
  <!-- 副 sparkle，右上角小 -->
  <path d="M 36 8
           L 36.8 10.5
           L 39.3 11.3
           L 36.8 12.1
           L 36 14.6
           L 35.2 12.1
           L 32.7 11.3
           L 35.2 10.5 Z"
        fill="#000000"/>
</svg>
